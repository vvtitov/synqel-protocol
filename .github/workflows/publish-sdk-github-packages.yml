# Publishes @synqel/sdk to GitHub Packages (npm registry on github.com).
#
# The npm scope (@synqel) must match a GitHub user or organization name.
# If this repo is not owned by "synqel", create a fine-grained or classic PAT
# with packages:write for the @synqel org and store it as GH_PACKAGES_PUBLISH_TOKEN.
#
# Triggers: publish a GitHub Release, or run this workflow manually.

name: Publish SDK to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sdk-github-packages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test and build SDK
        run: |
          bun run --cwd packages/sdk test
          bun run --cwd packages/sdk build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@synqel"

      - name: Publish to GitHub Packages
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm publish --ignore-scripts --access public
